name: Gmail Auto Sorter

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sort-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run script
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEBHOOK_REQUIRED: ${{ secrets.WEBHOOK_REQUIRED }}
          WEBHOOK_UNNECESSARY: ${{ secrets.WEBHOOK_UNNECESSARY }}
          WEBHOOK_PROMOTIONS: ${{ secrets.WEBHOOK_PROMOTIONS }}
        run: python mail_sorter.py
